<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>마커 위치 편집기 · WSM-6035</title>
<style>
  :root{--red:#c8102e;--bg:#f4f5f7;--card:#fff;--line:#e3e6ea;--sub:#5b6570}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Malgun Gothic","맑은 고딕",sans-serif;background:var(--bg);color:#1c2530}
  header{position:sticky;top:0;z-index:50;background:#1c2530;color:#fff;padding:12px 16px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  header h1{margin:0;font-size:16px}
  header p{margin:4px 0 0;font-size:12px;color:#b9c2cc;line-height:1.5}
  .wrap{max-width:760px;margin:0 auto;padding:14px}
  .diag{background:var(--card);border:1px solid var(--line);border-radius:14px;margin:14px 0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .diag h2{margin:0;padding:11px 14px;font-size:14.5px;border-bottom:1px solid var(--line);background:#fafbfc}
  .stage{position:relative;line-height:0;background:#fff;touch-action:none;-webkit-user-select:none;user-select:none}
  .stage img{width:100%;display:block;pointer-events:none}
  .mk{position:absolute;transform:translate(-50%,-50%);min-width:26px;height:26px;padding:0 5px;border-radius:14px;
      background:var(--red);color:#fff;font-size:13px;font-weight:800;line-height:26px;text-align:center;
      box-shadow:0 0 0 2px #fff,0 1px 4px rgba(0,0,0,.5);cursor:grab;touch-action:none}
  .mk.drag{cursor:grabbing;background:#0a7d2c;box-shadow:0 0 0 2px #fff,0 3px 10px rgba(0,0,0,.5);z-index:20}
  .legend{padding:8px 12px 12px;display:flex;flex-wrap:wrap;gap:5px}
  .chip{font-size:11.5px;color:var(--sub);background:#f1f3f5;border:1px solid var(--line);border-radius:8px;padding:3px 7px;line-height:1.3}
  .chip b{color:var(--red)}
  .bar{position:sticky;bottom:0;z-index:50;background:#fff;border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
  .bar button{flex:1;min-width:130px;border:0;border-radius:10px;padding:12px;font-size:14px;font-weight:800;cursor:pointer}
  #save{background:var(--red);color:#fff}
  #copy{background:#1c2530;color:#fff}
  #reset{background:#e9edf1;color:#333;flex:0 0 auto;min-width:90px}
  textarea{width:100%;height:120px;margin-top:8px;font-family:monospace;font-size:11px;border:1px solid var(--line);border-radius:8px;padding:8px;display:none}
  .hint{font-size:11.5px;color:var(--sub);padding:0 14px 10px}
</style>
</head>
<body>
<header>
  <h1>마커 위치 편집기</h1>
  <p>번호를 손가락(또는 마우스)으로 <b>드래그</b>해 각 라벨 카드 중앙에 놓으세요.<br>다 옮기면 아래 <b>[좌표 저장]</b> → <b>marker_coords.json</b> 파일이 저장됩니다. 그 파일을 채팅에 알려주시면 반영합니다.</p>
</header>
<div class="wrap" id="wrap"></div>
<div class="bar">
  <button id="reset">되돌리기</button>
  <button id="copy">JSON 복사</button>
  <button id="save">좌표 저장 (다운로드)</button>
</div>
<div class="hint">복사가 편하면 [JSON 복사] 후 채팅에 붙여넣어 주셔도 됩니다.</div>
<textarea id="out" readonly></textarea>

<script>
// 진단 이미지별 마커: {n:표시번호, name:이름} — index.html 안 span 순서와 동일
const DIAGRAMS = [
 {src:"img/parts_ext.png", title:"1. 각부명칭 (외부)", mk:[
   [1,"전동모터 (DC24V)",54.5,8],[2,"개폐 축 커플링",28,8],[3,"출력축",35,21],[4,"개폐 축 고정볼트",8.5,33],
   [5,"커플링 고정볼트",24.5,61.5],[6,"가이드 암 커플링 체결 홀",25.5,76.5],[7,"가이드 암 커플링 삽입하는 곳",46.5,92],
   [8,"LED:전원표시",82,43],[9,"안전커버",81.5,50.5],[10,"전기 공급선",90,59],[11,"통기구",90,65.5],
   [12,"리미트 설정 노브(녹색)",73,74],[13,"리미트 설정 노브(적색)",65.5,87]]},
 {src:"img/dial_name.png", title:"2. 리미트 설정부", mk:[
   [1,"모터쪽(방향)",50,20],[2,"LED 표시",87.5,28.5],[3,"스위치 롤러",12.5,45.5],[4,"다이얼 돌기",12.5,54],
   [5,"화살표시",87.5,55.5],[6,"설정 노브",87.5,64],[7,"회전 숫자",87.5,73],[8,"회전수 눈금",88.5,83.5],
   [9,"적색 다이얼",40,94.5],[10,"녹색 다이얼",64,94.5]]},
 {src:"img/inst_overview.png", title:"3. 설치 개요 (재크롭·하단 라벨 복원)", mk:[
   [1,"피복재",92.5,50],[2,"개폐 축",85.5,73],[3,"천장 곡부용 전동개폐기",10,82.5],[4,"측면용 전동개폐기",72.5,82.5]]},
 {src:"img/inst_arm.png", title:"4. 가이드 암 조립도 (6035 신규 도해)", mk:[
   [1,"커플링 고정볼트",5,10],[2,"개폐축 고정볼트(위)",30,4],[3,"전동개폐기",4,18],[4,"개폐 축",67,14.5],
   [5,"커플링",67,21.5],[2,"개폐축 고정볼트(우)",63,27],[6,"가이드암 커플링 체결볼트",60,34],[7,"가이드암 고정볼트",62,43],
   [8,"가이드 암 커플링",63,52],[9,"전기 공급선",7,51.5],[10,"너트(6mm)",10,58],[11,"가이드 암 속대(25.4Ø)",10,65],
   [12,"가이드 암 겉대(32Ø)",23,75],[13,"가이드 암 핀(32Ø용)",41,84],[14,"선회 축 볼트",44,94],[15,"기둥(지주)",87,82],[16,"선회 축 홀더",87,88]]},
 {src:"img/inst_roller.png", title:"5. 가이드 롤러 설치도", mk:[
   [1,"가이드 롤러(위)",22.5,8],[2,"고정볼트",10,21.5],[3,"전동개폐기(좌)",10.5,44],[4,"고정너트",11,70],
   [5,"궤도(좌)",19,82],[3,"전동개폐기(우)",47.5,72],[5,"궤도(우)",51,90],[6,"피복재",90,66],
   [7,"개폐 축",90,74],[8,"보조밴드",81,83],[1,"가이드 롤러(우)",77,89]]},
 {src:"img/inst_rope.png", title:"6. 로프 예인 방식", mk:[
   [1,"베어링",35,18],[2,"구동 축",18.5,30],[3,"롤러",19,37],[4,"비닐 피복재",88.5,42],
   [5,"전동개폐기",9,57],[6,"로프",14,67],[7,"고정기둥",11.5,83]]}
];

const wrap = document.getElementById('wrap');
const state = []; // per diagram: {src, marks:[{n,name,x,y,el,chip}]}

DIAGRAMS.forEach(dg=>{
  const box=document.createElement('div'); box.className='diag';
  const h=document.createElement('h2'); h.textContent=dg.title; box.appendChild(h);
  const stage=document.createElement('div'); stage.className='stage';
  const img=document.createElement('img'); img.src=dg.src; img.alt=dg.title; stage.appendChild(img);
  const legend=document.createElement('div'); legend.className='legend';
  const marks=[];
  dg.mk.forEach((m,idx)=>{
    const [n,name,x,y]=m;
    const el=document.createElement('div'); el.className='mk'; el.textContent=n; el.style.left=x+'%'; el.style.top=y+'%';
    stage.appendChild(el);
    const chip=document.createElement('span'); chip.className='chip'; legend.appendChild(chip);
    const rec={n,name,x,y,el,chip};
    marks.push(rec);
    updChip(rec);
    enableDrag(el,rec,stage);
  });
  box.appendChild(stage); box.appendChild(legend); wrap.appendChild(box);
  state.push({src:dg.src, marks});
});

function updChip(r){ r.chip.innerHTML='<b>'+r.n+'</b> '+r.name+' ('+r.x.toFixed(1)+', '+r.y.toFixed(1)+')'; }

function enableDrag(el,rec,stage){
  let active=false;
  const move=(cx,cy)=>{
    const rc=stage.getBoundingClientRect();
    let x=(cx-rc.left)/rc.width*100, y=(cy-rc.top)/rc.height*100;
    x=Math.max(0,Math.min(100,x)); y=Math.max(0,Math.min(100,y));
    rec.x=x; rec.y=y; el.style.left=x+'%'; el.style.top=y+'%'; updChip(rec);
  };
  el.addEventListener('pointerdown',e=>{active=true; el.classList.add('drag'); el.setPointerCapture(e.pointerId); e.preventDefault();});
  el.addEventListener('pointermove',e=>{ if(active){ move(e.clientX,e.clientY); e.preventDefault(); } });
  const end=e=>{ if(active){active=false; el.classList.remove('drag');} };
  el.addEventListener('pointerup',end); el.addEventListener('pointercancel',end);
}

function buildJSON(){
  const o={};
  state.forEach(d=>{ o[d.src]=d.marks.map(m=>({n:m.n, x:+m.x.toFixed(1), y:+m.y.toFixed(1)})); });
  return JSON.stringify(o,null,1);
}

document.getElementById('save').addEventListener('click',()=>{
  const blob=new Blob([buildJSON()],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='marker_coords.json';
  document.body.appendChild(a); a.click(); a.remove();
});
document.getElementById('copy').addEventListener('click',async()=>{
  const t=document.getElementById('out'); t.style.display='block'; t.value=buildJSON();
  try{ await navigator.clipboard.writeText(t.value); alert('JSON을 복사했습니다. 채팅에 붙여넣어 주세요.'); }
  catch(e){ t.select(); alert('아래 상자의 JSON을 길게 눌러 복사해 주세요.'); }
});
document.getElementById('reset').addEventListener('click',()=>{
  if(!confirm('처음 위치로 되돌릴까요?')) return;
  state.forEach((d,di)=>d.marks.forEach((m,mi)=>{
    const o=DIAGRAMS[di].mk[mi]; m.x=o[2]; m.y=o[3]; m.el.style.left=m.x+'%'; m.el.style.top=m.y+'%'; updChip(m);
  }));
});
</script>
</body>
</html>
